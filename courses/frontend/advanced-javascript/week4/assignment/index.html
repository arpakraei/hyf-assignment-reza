<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Javascript Week 4</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script src="config.js" defer></script>
    <script src="scripts.js" defer></script>
  </head>

  <body>
    <div class="container-sm mt-4">
      <div class="mb-4">
        <h5 class="mb-3">Capture Screenshot</h5>

        <div class="mb-3">
          <label class="form-label">URL</label>
          <input
            type="text"
            id="url-input"
            class="form-control"
            placeholder="Enter URL"
          />
          <div class="form-text">Enter the URL to get the screenshot</div>
        </div>

        <div class="mb-3">
          <button
            type="button"
            id="capture-button"
            class="btn btn-primary me-2"
          >
            Capture
          </button>

          <button type="button" id="save-button" class="btn btn-secondary">
            Save
          </button>
        </div>

        <div id="userMessage" class="mb-3"></div>

        <div id="preview-container" class="mt-3 d-none">
          <img id="imgPreview" class="img-fluid rounded border" alt="Preview" />
          <p id="previewUrl" class="mt-2 text-muted small"></p>
        </div>
      </div>

      <h2 class="mt-4 mb-3">Screenshot List</h2>

      <div id="screenshot-list" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
