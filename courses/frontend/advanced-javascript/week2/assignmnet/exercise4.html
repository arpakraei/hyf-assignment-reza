<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keyboard Game</title>
  <script src="exercise4.js" defer></script>
</head>
<body>

  <h2>Press "L" or "S" as fast as you can!</h2>

  <input type="number" id="game-time" placeholder="Enter seconds" />

  <button id="start-button">Start Game</button>

  <h3>Timer: <span id="timer-display">0</span></h3>

  <p>Player L: <span id="player-l-score">0</span></p>
  <p>Player S: <span id="player-s-score">0</span></p>

  <h3 id="result-message"></h3>

  <script src="index.js"></script>
</body>
</html>
